site_name: ColleC
site_description: >-
  Outil de gestion de collections numérisées pour archives
  universitaires
site_url: https://hsbtqemy.github.io/ColleC/
repo_url: https://github.com/Hsbtqemy/ColleC
repo_name: Hsbtqemy/ColleC

theme:
  name: material
  language: fr
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mode clair
  icon:
    logo: material/folder-multiple-outline

plugins:
  - search
  - macros:
      on_undefined: strict

# Variables disponibles dans les pages via {{ ... }} (mkdocs-macros).
# Utilité : éviter de hardcoder l'URL du dépôt à 14+ endroits.
extra:
  repo_main: https://github.com/Hsbtqemy/ColleC/blob/main
  repo_tree: https://github.com/Hsbtqemy/ColleC/tree/main

# Documents de travail interne (préservés en dépôt mais non publiés
# sur le site MkDocs, pour rester accessibles à Claude Code et aux
# contributeurs sans encombrer l'utilisateur).
exclude_docs: |
  developpeurs/roadmap.md
  developpeurs/backlog-revue-generale.md
  developpeurs/deploiement-future.md
  developpeurs/v092-import-refonte.md
  developpeurs/portail-public-future.md
  developpeurs/annotations-image-future.md
  developpeurs/workflow-numerisation.md
  developpeurs/plan-de-chantier.md
  developpeurs/sites-statiques-future.md
  developpeurs/notebooks-sdk-future.md
  developpeurs/zotero-future.md
  developpeurs/idees-ui-vrac.md
  developpeurs/ocr-module-future.md
  developpeurs/contribution-fichiers-structures-future.md
  developpeurs/vocabulaire-scoping-future.md
  developpeurs/champs-personnalises-nakala-future.md
  developpeurs/operations-par-lot-future.md
  developpeurs/nakala-depot-future.md
  developpeurs/backlog-nakala-collection.md
  developpeurs/nakala-savoir-api.md
  developpeurs/backlog-nakala-api.md
  developpeurs/nakala-audit-croise-nakalapycon.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - attr_list
  - md_in_html


nav:
  - Accueil: index.md
  - Premiers pas:
    - Vue d'ensemble: premiers-pas/index.md
    - Installation: premiers-pas/installation.md
    - Configuration: premiers-pas/configuration.md
    - Premier import: premiers-pas/premier-import.md
    - Workflow type: premiers-pas/workflow-type.md
    - Installation locale + WebDAV: premiers-pas/installation-locale-webdav.md
  - Guide utilisateur:
    - Vue d'ensemble: guide/index.md
    - Concepts: guide/concepts.md
    - Interface web: guide/interface-web.md
    - Synthèse et édition inline: guide/synthese-edition-inline.md
    - Annotations IIIF: guide/annotations.md
    - Recherche: guide/recherche.md
    - Liseuse de consultation: guide/liseuse.md
    - Assistant d'import (web): guide/import-assistant.md
    - Champs personnalisés + vocabulaires: guide/champs-vocabulaires.md
    - Depuis un notebook Python: guide/notebook.md
    - CLI:
      - Vue d'ensemble: guide/cli/index.md
      - importer: guide/cli/importer.md
      - fonds: guide/cli/fonds.md
      - collections: guide/cli/collections.md
      - items: guide/cli/items.md
      - exporter: guide/cli/exporter.md
      - controler: guide/cli/controler.md
      - montrer: guide/cli/montrer.md
      - renommer: guide/cli/renommer.md
      - deriver: guide/cli/deriver.md
      - nakala: guide/cli/nakala.md
      - sharedocs: guide/cli/sharedocs.md
      - utilisateurs: guide/cli/utilisateurs.md
  - Référence:
    - Vue d'ensemble: reference/index.md
    - Profils d'import: reference/profils.md
    - Formats d'export: reference/exports.md
    - Contrôles qa: reference/controles.md
    - Schéma de données: reference/schema.md
  - Pour développeurs:
    - Vue d'ensemble: developpeurs/index.md
    - Architecture: developpeurs/architecture.md
    - Modèle de données: developpeurs/modele.md
    - Services: developpeurs/services.md
    - Tests: developpeurs/tests.md
    - Composants UI: developpeurs/composants-ui.md
    - Contribuer: developpeurs/contribuer.md
  - Annexes:
    - Limites connues: annexes/limites.md
    - Changelog: annexes/changelog.md
