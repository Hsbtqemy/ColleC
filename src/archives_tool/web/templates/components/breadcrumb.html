{# Fil d'Ariane simple : un lien parent + une feuille en cote monospace.
   Variables : `parent_href`, `parent_label`, `feuille_cote`. #}
<nav class="text-sm text-gray-500 mb-2">
  <a href="{{ parent_href }}" class="hover:text-gray-700">{{ parent_label }}</a>
  <span aria-hidden="true">/</span>
  <span class="text-gray-700 font-mono">{{ feuille_cote }}</span>
</nav>
