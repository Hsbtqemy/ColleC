{# Onglets de la vue collection. Variables : `cote`, `actif` (slug URL). #}
<nav class="flex gap-1 border-b border-border-tertiary mb-6"
     hx-target="#tab-content" hx-push-url="true" hx-swap="innerHTML">
  {% for code, libelle in [
    ('items', 'Items'),
    ('sous-collections', 'Sous-collections'),
    ('fichiers', 'Fichiers'),
  ] %}
    <a href="/collection/{{ cote }}/{{ code }}"
       hx-get="/collection/{{ cote }}/{{ code }}"
       class="px-3 py-2 text-sm border-b-2 -mb-px transition-colors
              {{ 'border-gray-900 text-gray-900 font-medium'
                 if code == actif
                 else 'border-transparent text-gray-500 hover:text-gray-700' }}">
      {{ libelle }}
    </a>
  {% endfor %}
</nav>
