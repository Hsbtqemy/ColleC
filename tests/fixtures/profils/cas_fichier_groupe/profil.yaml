# Profil d'import — granularité fichier (export Nakala)
# Une ligne du tableur = un fichier. L'importer groupera par cote pour
# créer les items.
# Inspiré librement d'un export Nakala type Por Favor.

version_profil: 1

collection:
  cote: "PF"
  titre: "Por Favor (fictif)"
  editeur: "Édition fictive"
  lieu_edition: "Barcelone"
  periodicite: "mensuel"
  doi_nakala: "10.34847/nkl.fakepfcoll"
  description: "Revue satirique espagnole, données synthétiques."
  description_interne: >
    Fixture de test. Démontre l'import depuis un export Nakala :
    granularité fichier, DOI item par fichier, DOI collection partagé.
  auteur_principal: "Équipe fixture"

tableur:
  chemin: "tableur.csv"
  ligne_entete: 1
  separateur_csv: ";"

granularite_source: "fichier"

mapping:
  cote: "cote_item"
  titre: "titre"
  date: "date"
  doi_nakala: "doi_item"
  doi_collection_nakala: "doi_collection"
  metadonnees.numero_page: "numero_page"
  metadonnees.fichier_source: "fichier"

fichiers:
  racine: "scans_revues"
  # La clé source s'appelle « fichier » dans le tableur, stockée sous
  # metadonnees.fichier_source par le mapping ci-dessus.
  motif_chemin: "{fichier_source}"
  type_motif: "template"
  extensions: [".png", ".jpg", ".tif"]

valeurs_par_defaut:
  langue: "spa"
  etat_catalogage: "a_verifier"
